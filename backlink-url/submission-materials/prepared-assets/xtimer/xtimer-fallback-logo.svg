<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">XTimer fallback directory logo</title>
  <desc id="desc">A fallback SVG logo prepared for directory submissions when the official XTimer SVG logo is unavailable.</desc>
  <defs>
    <linearGradient id="bg" x1="128" y1="80" x2="896" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.48" stop-color="#123B5D"/>
      <stop offset="1" stop-color="#00A6A6"/>
    </linearGradient>
    <linearGradient id="ring" x1="250" y1="190" x2="774" y2="834" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#B8FFF7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#001018" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="226" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <circle cx="512" cy="512" r="274" fill="none" stroke="url(#ring)" stroke-width="54"/>
    <path d="M512 240v94" stroke="#FFFFFF" stroke-width="54" stroke-linecap="round"/>
    <path d="M512 512l142-116" stroke="#FFFFFF" stroke-width="58" stroke-linecap="round"/>
    <path d="M512 512l106 151" stroke="#B8FFF7" stroke-width="58" stroke-linecap="round"/>
    <circle cx="512" cy="512" r="42" fill="#FFFFFF"/>
    <path d="M342 746l340-468" stroke="#FFFFFF" stroke-width="58" stroke-linecap="round" opacity="0.96"/>
    <path d="M682 746L342 278" stroke="#B8FFF7" stroke-width="58" stroke-linecap="round" opacity="0.96"/>
  </g>
  <text x="512" y="908" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="92" font-weight="800" letter-spacing="8" fill="#FFFFFF">XTIMER</text>
</svg>
